name: TaskForge CI

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: taskforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+psycopg2://myuser:mypassword@localhost/taskforge_test
          TEST_DATABASE_URL: postgresql+psycopg2://myuser:mypassword@localhost/taskforge_test
          JWT_SECRET: test-secret
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head


      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://myuser:mypassword@localhost/taskforge_test
          TEST_DATABASE_URL: postgresql+psycopg2://myuser:mypassword@localhost/taskforge_test
          JWT_SECRET: test-secret
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest